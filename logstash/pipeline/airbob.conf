input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/config/jdbc/mysql-connector-j-8.0.33.jar"
    jdbc_driver_class => "com.mysql.cj.jdbc.Driver"
    jdbc_connection_string => "${LOGSTASH_JDBC_URL:jdbc:mysql://mysql:3306/airbobdb?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}"
    jdbc_user => "${LOGSTASH_JDBC_USER:logstash}"
    jdbc_password => "${LOGSTASH_JDBC_PASSWORD:logstash}"

    jdbc_paging_enabled => true
    jdbc_page_size => 50000
    jdbc_fetch_size => 50000
    clean_run => true

    statement => "
      SELECT
        BIN_TO_UUID(a.accommodation_uid) AS id,
        a.id AS accommodation_id,
        a.name,
        a.description,
        a.base_price,
        a.currency,
        a.type,
        a.status,
        DATE_FORMAT(a.created_at, '%Y-%m-%dT%H:%i:%s.000Z') AS created_at,
        a.thumbnail_url,

        ad.latitude,
        ad.longitude,
        ad.country,
        ad.state,
        ad.city,
        ad.district,
        ad.street,
        ad.detail AS address_detail,
        ad.postal_code,

        COALESCE(op.max_occupancy, 0) AS max_guests,
        COALESCE(op.infant_occupancy, 0) AS max_infants,
        COALESCE(op.pet_occupancy, 0) AS max_pets,

        COALESCE(ars.total_review_count, 0) AS review_count,
        COALESCE(ars.average_rating, 0.0) AS average_rating,

        amenities.amenity_types_str,
        reservations.reservation_ranges_json
      FROM accommodation a
      LEFT JOIN address ad ON a.address_id = ad.id
      LEFT JOIN occupancy_policy op ON a.occupancy_policy_id = op.id
      LEFT JOIN accommodation_review_summary ars ON a.id = ars.accommodation_id
      LEFT JOIN (
        SELECT
          aa.accommodation_id,
          GROUP_CONCAT(DISTINCT aa.amenity_code ORDER BY aa.amenity_code SEPARATOR ',') AS amenity_types_str
        FROM accommodation_amenity aa
        WHERE aa.amenity_code IS NOT NULL
          AND aa.amenity_code <> ''
        GROUP BY aa.accommodation_id
      ) amenities ON amenities.accommodation_id = a.id
      LEFT JOIN (
        SELECT
          r.accommodation_id,
          JSON_ARRAYAGG(
            JSON_OBJECT(
              'gte', DATE_FORMAT(DATE(r.check_in), '%Y-%m-%d'),
              'lt', DATE_FORMAT(DATE(r.check_out), '%Y-%m-%d')
            )
          ) AS reservation_ranges_json
        FROM reservation r
        WHERE r.status = 'CONFIRMED'
          AND r.check_out >= CURRENT_TIMESTAMP(6)
        GROUP BY r.accommodation_id
      ) reservations ON reservations.accommodation_id = a.id
      WHERE a.status = 'PUBLISHED'
        AND a.accommodation_uid IS NOT NULL
      ORDER BY a.id
    "
  }
}

filter {
  mutate {
    convert => {
      "accommodation_id" => "integer"
      "latitude" => "float"
      "longitude" => "float"
      "average_rating" => "float"
      "review_count" => "integer"
      "base_price" => "integer"
      "max_guests" => "integer"
      "max_infants" => "integer"
      "max_pets" => "integer"
    }
  }

  if [latitude] and [longitude] {
    mutate {
      rename => {
        "latitude" => "[location][lat]"
        "longitude" => "[location][lon]"
      }
    }
  }

  ruby {
    code => '
      require "json"

      raw_amenities = event.get("amenity_types_str")
      amenities = []
      if raw_amenities && raw_amenities != "" && raw_amenities != "null"
        amenities = raw_amenities.to_s.split(",").map(&:strip).reject(&:empty?)
      end
      event.set("amenityTypes", amenities)

      raw = event.get("reservation_ranges_json")
      ranges = []
      if raw && raw != "" && raw != "null"
        ranges = JSON.parse(raw)
      end
      event.set("reservationRanges", ranges)
    '
  }

  mutate {
    rename => {
      "accommodation_id" => "accommodationId"
      "base_price" => "basePrice"
      "created_at" => "createdAt"
      "thumbnail_url" => "thumbnailUrl"
      "address_detail" => "addressDetail"
      "postal_code" => "postalCode"
      "max_guests" => "maxGuests"
      "max_infants" => "maxInfants"
      "max_pets" => "maxPets"
      "review_count" => "reviewCount"
      "average_rating" => "averageRating"
    }
  }

  mutate {
    remove_field => [
      "@version",
      "@timestamp",
      "amenity_types_str",
      "reservation_ranges_json"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["${LOGSTASH_ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    index => "accommodations"
    document_id => "%{id}"
  }
}
