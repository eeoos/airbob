name: CD (Prod)

on:
  push:
    branches: [ main ]

concurrency:
  group: cd-main
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: airbob-repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_sha7: ${{ steps.meta.outputs.image_sha7 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (with Gradle cache)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR with Gradle (skip tests)
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          echo "image_sha7=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and Push multi-arch image
        uses: docker/build-push-action@v6
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_SHA7: ${{ steps.meta.outputs.image_sha7 }}
        with:
          context: .
          file: docker/app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_sha7 }}
            ghcr.io/${{ github.repository_owner }}/airbob:${{ steps.meta.outputs.image_sha7 }}
            ghcr.io/${{ github.repository_owner }}/airbob:latest

  deploy-oci:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy app and verify health
        env:
          IMAGE_SHA7: ${{ needs.build-and-push.outputs.image_sha7 }}
        run: |
          set -Eeuo pipefail
          cd "$HOME/airbob"

          COMPOSE=(docker compose --env-file .env.oci -f docker-compose.yml)
          IMAGE_REPO=ghcr.io/eeoos/airbob
          OLD_IMAGE_ID=$(docker inspect --format='{{.Image}}' airbob-app)

          wait_healthy() {
            local phase="$1"
            local status

            for attempt in {1..42}; do
              status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' airbob-app 2>/dev/null || echo missing)
              echo "$phase app health status: $status ($attempt/42)"

              case "$status" in
                healthy)
                  return 0
                  ;;
                unhealthy|exited|dead|missing)
                  return 1
                  ;;
              esac

              sleep 10
            done

            return 1
          }

          reload_nginx() {
            docker exec nginx nginx -t \
              && docker exec nginx nginx -s reload \
              && docker exec nginx wget -q --spider http://app:8080/actuator/health
          }

          rollback() {
            echo "Rolling back to image $OLD_IMAGE_ID" >&2
            docker image tag "$OLD_IMAGE_ID" "$IMAGE_REPO:latest" || return 1
            "${COMPOSE[@]}" up -d --no-deps --force-recreate --pull never app || return 1
            wait_healthy rollback || return 1
            reload_nginx
          }

          "${COMPOSE[@]}" config --quiet
          docker pull "$IMAGE_REPO:$IMAGE_SHA7"
          docker image tag "$IMAGE_REPO:$IMAGE_SHA7" "$IMAGE_REPO:latest"

          if ! "${COMPOSE[@]}" up -d --no-deps --force-recreate --pull never app \
            || ! wait_healthy deploy \
            || ! reload_nginx; then
            docker logs --tail 200 airbob-app || true
            rollback || echo "Rollback failed; manual recovery required" >&2
            exit 1
          fi

