global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: airbob
    scrape_timeout: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8080
        labels:
          environment: oci

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
